<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

    <div class="container">

        <div class="profile-card">

            <h1>User Profile</h1>

            <h2 id="userName">
                User Name
            </h2>

            <p id="userEmail">
                user@email.com
            </p>

            <div class="stats">

                <div class="stat-box">
                    <h3>15</h3>
                    <p>Interviews</p>
                </div>

                <div class="stat-box">
                    <h3>82%</h3>
                    <p>Exam Score</p>
                </div>

                <div class="stat-box">
                    <h3>20</h3>
                    <p>Coding Attempts</p>
                </div>

            </div>

            <button onclick="editProfile()">
                Edit Profile
            </button>

        </div>

    </div>

    <script src="js/profile.js"></script>

</body>
</html>
