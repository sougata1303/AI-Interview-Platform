<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewAI Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">InterviewAI</div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-target="dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="#" class="nav-item" data-target="ai-interview"><i class="fa-solid fa-robot"></i> AI Interview</a>
                <a href="#" class="nav-item" data-target="exam-prep"><i class="fa-solid fa-book-open"></i> Exam Prep</a>
                <a href="#" class="nav-item" data-target="coding-practice"><i class="fa-solid fa-code"></i> Coding Practice</a>
                <a href="#" class="nav-item" data-target="resume-analyzer"><i class="fa-solid fa-file-invoice"></i> Resume Analyzer</a>
                <a href="#" class="nav-item" data-target="analytics"><i class="fa-solid fa-chart-line"></i> Analytics</a>
                <a href="#" class="nav-item" data-target="profile"><i class="fa-solid fa-user"></i> Profile</a>
            </nav>
            <a href="#" class="logout-btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </aside>

        <main class="main-content">
            
            <section id="dashboard" class="content-view active">
                <div class="welcome-header">
                    <h1>Welcome User</h1>
                    <p>Continue your preparation journey.</p>
                </div>

                <div class="productivity-section">
                    
                    <div class="timer-widget">
                        <h2>Focus Timer</h2>
                        <p class="subtitle">Customize your study intervals and track sessions automatically.</p>
                        
                        <div class="timer-presets">
                            <button class="preset-btn active" data-time="1500">Work Presets</button>
                            <button class="preset-btn" data-time="300">Short Break</button>
                            <button class="preset-btn" data-time="custom">Custom Time</button>
                        </div>

                        <div class="timer-display-container">
                            <div class="timer-setup">
                                <label for="subjectSelect">Subject Association</label>
                                <select id="subjectSelect">
                                    <option value="General Focus">General Focus</option>
                                    <option value="Coding Practice">Coding Practice</option>
                                    <option value="Exam Revision">Exam Revision</option>
                                    <option value="Interview prep">Interview Prep</option>
                                </select>
                            </div>

                            <div class="timer-circle-wrapper">
                                <div class="timer-circle">
                                    <span id="timeDisplay">25:00</span>
                                </div>
                                <div class="timer-controls">
                                    <button id="resetTimerBtn" title="Reset"><i class="fa-solid fa-arrow-rotate-left"></i></button>
                                    <button id="startTimerBtn" class="play-btn" title="Start/Pause"><i class="fa-solid fa-play"></i></button>
                                    <button id="skipTimerBtn" title="Skip"><i class="fa-solid fa-forward-step"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="planner-widget">
                        <h2>Study Planner & Progress</h2>
                        <div class="progress-container">
                            <div class="progress-info">
                                <span>Daily Target Completion</span>
                                <span id="progressPercent">0%</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div id="progressBar" class="progress-bar-fill" style="width: 0%;"></div>
                            </div>
                        </div>

                        <form id="todoForm" class="todo-input-group">
                            <input type="text" id="todoInput" placeholder="Add a specific study objective..." required>
                            <button type="submit"><i class="fa-solid fa-plus"></i></button>
                        </form>

                        <ul id="todoList" class="todo-list">
                            </ul>
                    </div>

                </div>
            </section>

            <section id="ai-interview" class="content-view">
                <iframe src="interview.html" id="interviewFrame" class="embedded-view-frame" title="AI Interview Panel"></iframe>
            </section>

            <section id="exam-prep" class="content-view">
                <iframe src="exam.html" id="examFrame" class="embedded-view-frame" title="Exam Preparation"></iframe>
            </section>

            <section id="coding-practice" class="content-view">
                <iframe src="coding.html" id="codingFrame" class="embedded-view-frame" title="Coding Practice Hub"></iframe>
            </section>

            <section id="resume-analyzer" class="content-view">
                <iframe src="resume.html" id="resumeFrame" class="embedded-view-frame" title="Resume Analyzer Engine"></iframe>
            </section>

            <section id="analytics" class="content-view">
                <iframe src="analytics.html" id="analyticsFrame" class="embedded-view-frame" title="Performance Analytics Dashboard"></iframe>
            </section>

            <section id="profile" class="content-view">
                <iframe src="profile.html" id="profileFrame" class="embedded-view-frame" title="Account Profile Settings"></iframe>
            </section>

        </main>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
